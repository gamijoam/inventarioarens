services:
  app:
    build:
      context: .
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: inventory_arens
      DB_USERNAME: inventory_arens
      DB_PASSWORD: secret

  app_test:
    build:
      context: .
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      postgres_test:
        condition: service_healthy
    environment:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: postgres_test
      DB_PORT: 5432
      DB_DATABASE: inventory_arens_testing
      DB_USERNAME: inventory_arens
      DB_PASSWORD: secret

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: inventory_arens
      POSTGRES_USER: inventory_arens
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_arens -d inventory_arens"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: inventory_arens_testing
      POSTGRES_USER: inventory_arens
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_arens -d inventory_arens_testing"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
